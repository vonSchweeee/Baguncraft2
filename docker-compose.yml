services:
  mc:
    image: itzg/minecraft-server:latest
    container_name: bagunserver2
    tty: true
    stdin_open: true
    restart: unless-stopped
    ports:
      - "25565:25565"
    environment:
      EULA: "TRUE"
      TYPE: NEOFORGE
      VERSION: "1.21.1"
      NEOFORGE_VERSION: latest
      # Server settings
      MEMORY: 5G
      MAX_PLAYERS: 12
      MOTD: "Bagunserver2"
      DIFFICULTY: normal
      GAMEMODE: survival
      ALLOW_FLIGHT: "false"
      ONLINE_MODE: "false"
      # Ops / whitelist (comma-separated player names or UUIDs)
      # OPS: "YourUsername"
      # WHITELIST: "Player1,Player2"
      # Mods — edit mods.txt to add/remove mods
      MODRINTH_PROJECTS: "@/mods.txt"
      MODRINTH_DOWNLOAD_DEPENDENCIES: required
      MODRINTH_PROJECTS_DEFAULT_VERSION_TYPE: beta
    volumes:
      - ./data:/data
      - ./mods.txt:/mods.txt:ro
      - ./mods:/mods
